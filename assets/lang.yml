# Logs

log-version: "Cardinal v{version} | {date}"
log-header: |
  ┏┓     ┓•    ┓
  ┃ ┏┓┏┓┏┫┓┏┓┏┓┃
  ┗┛┗┻┗ ┗┻┗┗┗┗┻┗ ᵇʸ ᵀᴴᴹᴵᴳᵁ
  {log_version}
  {separator}

terminal-log: "<bold><lcyan>[<lyellow>{date}<lcyan>]<reset> {message}"
file-log: "[{date}] {message}"

flush-logs: Logs flushed!

logged-in: "Logged in as <green><bold>{user}<reset> ({id})"
session-id: "<green><bold>Session ID:<reset> {id}"
logged-out: Logged out of client

config-missing: Config file not found!
config-empty: Config file is empty!
csv-missing: CSV log not found, creating a new one...
info-missing: Info file not found!
info-empty: Info file is empty!

redis-send: "Sending message from <green><bold>Redis<reset>: {message}"

message-log: "Received message ({msg_id}) from <green><bold>{username}<reset> ({user_id}): {message} ({channel_id}, {server_id})"
reply-log: "Received reply ({msg_id}) to {ref_id} from <green><bold>{username}<reset> ({user_id}): {message} ({channel_id}, {server_id})"
edit-log: "Message ({msg_id}) was edited by <green><bold>{username}<reset> ({user_id}): {msg_before} -> {msg_after} ({channel_id}, {server_id})"
delete-log: "Message ({msg_id}) was deleted by <green><bold>{username}<reset> ({user_id}): {message} ({channel_id}, {server_id})"

error: "<red>An error has occurred!"

shutdown: Shutting down!
sigterm: Received SIGTERM!

# Bot

## Success Embed
success-title: "✅ {message}"

## Fail Embed:
fail-title: "❌ {message}"

## About Embed
about-title: About
about-desc: |
  {mention} is the official moderation
  and game bot of the Ess. Ress. Server!
  
