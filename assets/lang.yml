  **{category}**:
  └ {item_1}
menu-list-m: |-
  **{category}**:
  ├ {item_1}
  └ {item_2}
menu-list-l: |-
  **{category}**:
  ├ {item_1}
  ├ {item_2}
  └ `+{remaining} more`
no-item: "No **{category}**"

